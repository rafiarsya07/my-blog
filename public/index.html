<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ThoughtLog — Rafi Arsya</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Newsreader:ital,opsz@0,6..72;1,6..72&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#fbfaf7; --ink:#1c1d1a; --ink-soft:#55564f; --faint:#8a8b81;
    --line:#e4e2d8; --accent:#1d4d44; --accent-soft:#e8efec; --paper:#fff;
    --danger:#8a3324; --amber:#9a6a00; --radius:4px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:"Newsreader",Georgia,serif;font-size:19px;line-height:1.6;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .mono{font-family:"JetBrains Mono",monospace}
  .wrap{max-width:760px;margin:0 auto;padding:0 24px}
  header.site{border-bottom:1px solid var(--line);padding:28px 0 24px;margin-bottom:40px}
  .site-inner{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand{font-family:"Fraunces",serif;font-weight:600;font-size:26px;letter-spacing:-.01em;cursor:pointer;background:none;border:none;color:var(--ink)}
  .brand .dot{color:var(--accent)}
  .tagline{font-size:13px;color:var(--faint);font-family:"JetBrains Mono",monospace}
  .nav{display:flex;gap:18px;align-items:center}
  .nav button{background:none;border:none;cursor:pointer;font-family:"JetBrains Mono",monospace;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);padding:4px 0;border-bottom:1px solid transparent}
  .nav button:hover{color:var(--accent);border-bottom-color:var(--accent)}
  .search-row{margin-bottom:32px;position:relative}
  .search-row input{width:100%;padding:12px 14px 12px 38px;border:1px solid var(--line);border-radius:var(--radius);background:var(--paper);font-family:"JetBrains Mono",monospace;font-size:14px;color:var(--ink)}
  .search-row input:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent}
  .search-row::before{content:"⌕";position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:18px}
  .tagcloud{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:36px}
  .tagcloud button{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--accent);background:var(--accent-soft);border:none;border-radius:20px;padding:4px 12px;cursor:pointer}
  .tagcloud button:hover{background:var(--accent);color:#fff}
  .post-card{padding:26px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .post-card:hover .post-title{color:var(--accent)}
  .post-meta{font-family:"JetBrains Mono",monospace;font-size:11.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .post-title{font-family:"Fraunces",serif;font-weight:600;font-size:25px;line-height:1.25;letter-spacing:-.015em;transition:color .15s}
  .post-excerpt{color:var(--ink-soft);margin-top:8px;font-size:17px}
  .tag{color:var(--accent)}
  .badge{font-size:10px;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.05em}
  .badge.draft{background:#f0eee6;color:var(--faint)}
  .badge.scheduled{background:#fdf3df;color:var(--amber)}
  .badge.published{background:var(--accent-soft);color:var(--accent)}
  article.post .post-title{font-size:38px;margin-bottom:14px;line-height:1.12}
  article.post .post-meta{margin-bottom:32px}
  .cover{width:100%;border-radius:var(--radius);margin-bottom:28px;border:1px solid var(--line)}
  .post-body{font-size:20px;line-height:1.72}
  .post-body h2{font-family:"Fraunces",serif;font-size:26px;font-weight:600;margin:36px 0 12px;letter-spacing:-.01em}
  .post-body h3{font-family:"Fraunces",serif;font-size:21px;font-weight:600;margin:28px 0 10px}
  .post-body p{margin:0 0 20px}
  .post-body ul,.post-body ol{margin:0 0 20px 24px}
  .post-body li{margin-bottom:8px}
  .post-body strong{font-weight:600}
  .post-body a{color:var(--accent);text-decoration:underline}
  .post-body blockquote{border-left:3px solid var(--accent);padding:4px 0 4px 20px;margin:0 0 20px;color:var(--ink-soft);font-style:italic}
  .post-body code{font-family:"JetBrains Mono",monospace;font-size:.85em;background:var(--accent-soft);padding:2px 6px;border-radius:3px;color:var(--accent)}
  .post-body pre{background:#1c1d1a;color:#e8e6dd;padding:18px 20px;border-radius:var(--radius);overflow-x:auto;margin:0 0 24px}
  .post-body pre code{background:none;color:inherit;padding:0;font-size:13.5px}
  .back-link{font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;background:none;border:none;cursor:pointer;margin-bottom:28px;padding:0}
  .back-link:hover{color:var(--accent)}
  .related{margin-top:48px;padding-top:28px;border-top:1px solid var(--line)}
  .related h3{font-family:"JetBrains Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin-bottom:16px}
  .related-item{cursor:pointer;padding:10px 0;font-family:"Fraunces",serif;font-weight:500;font-size:18px}
  .related-item:hover{color:var(--accent)}
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:28px;margin-bottom:24px}
  .panel h2{font-family:"Fraunces",serif;font-size:22px;font-weight:600;margin-bottom:18px}
  label{display:block;font-family:"JetBrains Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-bottom:6px}
  input[type=text],input[type=password],input[type=datetime-local],textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius);font-family:"JetBrains Mono",monospace;font-size:14px;background:var(--bg);color:var(--ink);margin-bottom:18px}
  textarea{min-height:340px;line-height:1.6;resize:vertical}
  input:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:-1px;border-color:transparent}
  .editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  .preview-pane{border:1px dashed var(--line);border-radius:var(--radius);padding:18px;background:var(--bg);min-height:340px;overflow-y:auto;max-height:520px}
  .preview-pane .preview-label{font-family:"JetBrains Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin-bottom:12px}
  .btn{font-family:"JetBrains Mono",monospace;font-size:13px;padding:10px 18px;border-radius:var(--radius);cursor:pointer;border:1px solid var(--accent);background:var(--accent);color:#fff;letter-spacing:.02em}
  .btn:hover{background:#163a33}
  .btn.ghost{background:none;color:var(--accent)}
  .btn.ghost:hover{background:var(--accent-soft)}
  .btn.danger{background:none;border-color:var(--danger);color:var(--danger)}
  .btn.danger:hover{background:var(--danger);color:#fff}
  .btn.amber{background:none;border-color:var(--amber);color:var(--amber)}
  .btn.amber:hover{background:var(--amber);color:#fff}
  .btn-group{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .stats-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:24px}
  .stat{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:16px 20px;flex:1;min-width:110px}
  .stat .num{font-family:"Fraunces",serif;font-size:28px;font-weight:600}
  .stat .lbl{font-family:"JetBrains Mono",monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-top:4px}
  .admin-post-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
  .admin-post-row .t{font-family:"Fraunces",serif;font-weight:500;font-size:17px}
  .admin-post-row .s{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--faint);margin-top:2px}
  .empty{text-align:center;color:var(--faint);padding:60px 0;font-family:"JetBrains Mono",monospace;font-size:13px}
  .error{color:var(--danger);font-family:"JetBrains Mono",monospace;font-size:13px;margin-bottom:14px}
  .schedule-box{background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:18px}
  footer.site{border-top:1px solid var(--line);margin-top:64px;padding:24px 0 48px;font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--faint);text-align:center;letter-spacing:.04em}
  @media (max-width:680px){.editor-grid{grid-template-columns:1fr}article.post .post-title{font-size:30px}.post-body{font-size:18px}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <header class="site">
    <div class="wrap site-inner">
      <button class="brand" onclick="go('/')">ThoughtLog<span class="dot">.</span></button>
      <span class="tagline">notes on what I build &amp; why</span>
      <nav class="nav" id="nav"></nav>
    </div>
  </header>
  <main class="wrap" id="app"></main>
  <footer class="site"><div class="wrap">© Rafi Arsya · built with Node, Express, PostgreSQL &amp; a hand-rolled CMS</div></footer>
<script>
const app=document.getElementById("app"),nav=document.getElementById("nav");
let me=null;
function go(p){history.pushState({},"",p);route()}
window.onpopstate=route;
async function api(path,opts={}){const r=await fetch("/api"+path,{headers:{"Content-Type":"application/json"},...opts});if(!r.ok)throw await r.json().catch(()=>({error:"Request failed"}));return r.json()}
function fmtDate(ts){return new Date(ts).toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"})}
function fmtDateTime(ts){return new Date(ts).toLocaleString("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}
function esc(s){const d=document.createElement("div");d.textContent=s==null?"":s;return d.innerHTML}
async function refreshMe(){try{me=await api("/me")}catch{me=null}renderNav()}
function renderNav(){nav.innerHTML=me?`<button onclick="go('/admin')">Dashboard</button><button onclick="go('/write')">Write</button><button onclick="logout()">Sign out</button>`:`<button onclick="go('/login')">Sign in</button>`}

// ---- public list ----
async function viewList(searchTerm){
  app.innerHTML=`<div class="search-row"><input id="q" type="text" placeholder="search posts…" value="${searchTerm?esc(searchTerm):""}"/></div><div id="tagcloud" class="tagcloud"></div><div id="list"><div class="empty">loading…</div></div>`;
  const input=document.getElementById("q");let timer;
  input.oninput=()=>{clearTimeout(timer);timer=setTimeout(()=>{const v=input.value.trim();go(v?"/?q="+encodeURIComponent(v):"/")},250)};
  if(!searchTerm){try{const tags=await api("/tags");document.getElementById("tagcloud").innerHTML=tags.map(t=>`<button onclick="go('/tag/'+encodeURIComponent('${esc(t.tag)}'))">#${esc(t.tag)} ${t.count}</button>`).join("")}catch{}}
  const list=document.getElementById("list");
  try{
    const posts=searchTerm?await api("/search?q="+encodeURIComponent(searchTerm)):await api("/posts");
    renderCards(list,posts,searchTerm?`nothing matched “${esc(searchTerm)}”`:"no posts yet");
  }catch{list.innerHTML=`<div class="empty">could not load posts</div>`}
}
function renderCards(el,posts,emptyMsg){
  if(!posts.length){el.innerHTML=`<div class="empty">${emptyMsg}</div>`;return}
  el.innerHTML=posts.map(p=>`<div class="post-card" onclick="go('/p/${p.slug}')"><div class="post-meta"><span>${fmtDate(p.publishAt||p.createdAt)}</span>${p.tags.map(t=>`<span class="tag">#${esc(t)}</span>`).join("")}<span>${p.readingTime} min read</span><span>${p.views} views</span></div><div class="post-title">${esc(p.title)}</div><div class="post-excerpt">${esc(p.excerpt)}</div></div>`).join("");
}

// ---- tag page ----
async function viewTag(tag){
  app.innerHTML=`<button class="back-link" onclick="go('/')">← all posts</button><h2 style="font-family:Fraunces;font-weight:600;font-size:28px;margin-bottom:24px">#${esc(tag)}</h2><div id="list"><div class="empty">loading…</div></div>`;
  try{const posts=await api("/tags/"+encodeURIComponent(tag));renderCards(document.getElementById("list"),posts,"no posts with this tag")}catch{document.getElementById("list").innerHTML=`<div class="empty">could not load</div>`}
}

// ---- single post ----
async function viewPost(slug){
  app.innerHTML=`<div class="empty">loading…</div>`;
  try{
    const p=await api("/posts/"+slug);
    app.innerHTML=`<button class="back-link" onclick="go('/')">← all posts</button><article class="post"><div class="post-title">${esc(p.title)}</div><div class="post-meta"><span>${fmtDate(p.publishAt||p.createdAt)}</span>${p.tags.map(t=>`<span class="tag" style="cursor:pointer" onclick="go('/tag/'+encodeURIComponent('${esc(t)}'))">#${esc(t)}</span>`).join("")}<span>${p.readingTime} min read</span><span>${p.views} views</span></div>${p.coverImage?`<img class="cover" src="${esc(p.coverImage)}" alt=""/>`:""}<div class="post-body">${p.html}</div>${p.related&&p.related.length?`<div class="related"><h3>Related</h3>${p.related.map(r=>`<div class="related-item" onclick="go('/p/${r.slug}')">${esc(r.title)}</div>`).join("")}</div>`:""}</article>`;
  }catch{app.innerHTML=`<button class="back-link" onclick="go('/')">← all posts</button><div class="empty">post not found</div>`}
}

// ---- login ----
function viewLogin(){
  app.innerHTML=`<div class="panel" style="max-width:380px;margin:40px auto"><h2>Sign in to write</h2><div id="err"></div><label>Username</label><input id="u" type="text" autocomplete="username"/><label>Password</label><input id="pw" type="password" autocomplete="current-password"/><button class="btn" onclick="doLogin()">Sign in</button></div>`;
  document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin()});
}
async function doLogin(){
  const err=document.getElementById("err");err.innerHTML="";
  try{await api("/login",{method:"POST",body:JSON.stringify({username:document.getElementById("u").value,password:document.getElementById("pw").value})});await refreshMe();go("/admin")}
  catch(e){err.innerHTML=`<div class="error">${esc(e.error||"Login failed")}</div>`}
}
async function logout(){await api("/logout",{method:"POST"});me=null;renderNav();go("/")}

// ---- admin dashboard ----
async function viewAdmin(){
  if(!me)return go("/login");
  app.innerHTML=`<div class="empty">loading…</div>`;
  let posts=[],stats={};
  try{posts=await api("/admin/posts");stats=await api("/admin/stats")}catch{return go("/login")}
  app.innerHTML=`<div class="stats-row"><div class="stat"><div class="num">${stats.total}</div><div class="lbl">Total</div></div><div class="stat"><div class="num">${stats.published}</div><div class="lbl">Published</div></div><div class="stat"><div class="num">${stats.scheduled}</div><div class="lbl">Scheduled</div></div><div class="stat"><div class="num">${stats.drafts}</div><div class="lbl">Drafts</div></div><div class="stat"><div class="num">${stats.total_views}</div><div class="lbl">Total Views</div></div></div><div class="panel"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px"><h2 style="margin:0">All posts</h2><button class="btn" onclick="go('/write')">+ New post</button></div><div id="adminlist"></div></div>`;
  renderAdminList(posts);
}
function renderAdminList(posts){
  const el=document.getElementById("adminlist");
  if(!posts.length){el.innerHTML=`<div class="empty">no posts yet</div>`;return}
  el.innerHTML=posts.map(p=>{
    let sched=p.status==="scheduled"&&p.publishAt?` · publishes ${fmtDateTime(p.publishAt)}`:"";
    return `<div class="admin-post-row"><div><div class="t">${esc(p.title)} <span class="badge ${p.status}">${p.status}</span></div><div class="s">/${esc(p.slug)} · ${p.views} views${sched}</div></div><div class="btn-group"><button class="btn ghost" onclick="go('/edit/${p.id}')">Edit</button><button class="btn ghost" onclick="go('/p/${p.slug}')">View</button><button class="btn danger" onclick="delPost(${p.id})">Delete</button></div></div>`;
  }).join("");
}
async function delPost(id){if(!confirm("Delete this post for good?"))return;await api("/admin/posts/"+id,{method:"DELETE"});viewAdmin()}

// ---- editor (create + edit) ----
async function viewEditor(editId){
  if(!me)return go("/login");
  let post={title:"",tags:"",body:"",coverImage:"",status:"draft",publishAt:null};
  if(editId){
    try{const p=await api("/admin/posts/"+editId);post={title:p.title,tags:p.tags.join(", "),body:p.body,coverImage:p.coverImage||"",status:p.status,publishAt:p.publishAt}}
    catch{return go("/admin")}
  }
  const schedDefault=post.publishAt?new Date(post.publishAt).toISOString().slice(0,16):"";
  app.innerHTML=`
    <button class="back-link" onclick="go('/admin')">← dashboard</button>
    <div class="panel">
      <h2>${editId?"Edit post":"Write a new post"}</h2>
      <div id="err"></div>
      <label>Title</label><input id="title" type="text" placeholder="What's on your mind?" value="${esc(post.title)}"/>
      <label>Tags (comma separated)</label><input id="tags" type="text" placeholder="backend, devops" value="${esc(post.tags)}"/>
      <label>Cover image URL (optional)</label><input id="cover" type="text" placeholder="https://…" value="${esc(post.coverImage)}"/>
      <label>Body (Markdown) — live preview on the right</label>
      <div class="editor-grid">
        <textarea id="body" placeholder="## A heading&#10;&#10;Write your thoughts. **Bold**, lists, > quotes and \`code\` all work.">${esc(post.body)}</textarea>
        <div class="preview-pane"><div class="preview-label">Live preview</div><div id="preview" class="post-body"></div></div>
      </div>
      <div class="schedule-box">
        <label>Schedule (optional) — set a future date to auto-publish</label>
        <input id="schedat" type="datetime-local" value="${schedDefault}" style="margin-bottom:0"/>
      </div>
      <div class="btn-group">
        <button class="btn" onclick="savePost(${editId||0},'publish')">${editId?"Publish":"Publish now"}</button>
        <button class="btn amber" onclick="savePost(${editId||0},'schedule')">Schedule</button>
        <button class="btn ghost" onclick="savePost(${editId||0},'draft')">Save draft</button>
      </div>
    </div>`;
  const bodyEl=document.getElementById("body"),prev=document.getElementById("preview");
  let t;
  async function updatePreview(){try{const r=await api("/admin/preview",{method:"POST",body:JSON.stringify({body:bodyEl.value})});prev.innerHTML=r.html||'<span style="color:var(--faint)">nothing yet…</span>'}catch{}}
  bodyEl.oninput=()=>{clearTimeout(t);t=setTimeout(updatePreview,300)};
  updatePreview();
}
async function savePost(editId,action){
  const err=document.getElementById("err");err.innerHTML="";
  const payload={title:document.getElementById("title").value,tags:document.getElementById("tags").value,body:document.getElementById("body").value,coverImage:document.getElementById("cover").value,action};
  if(action==="schedule"){const s=document.getElementById("schedat").value;if(!s){err.innerHTML=`<div class="error">Pick a date/time to schedule.</div>`;return}payload.publishAt=new Date(s).toISOString()}
  try{
    if(editId)await api("/admin/posts/"+editId,{method:"PUT",body:JSON.stringify(payload)});
    else await api("/admin/posts",{method:"POST",body:JSON.stringify(payload)});
    go("/admin");
  }catch(e){err.innerHTML=`<div class="error">${esc(e.error||"Could not save")}</div>`}
}

// ---- router ----
function route(){
  const path=location.pathname,params=new URLSearchParams(location.search);
  if(path==="/")return viewList(params.get("q"));
  if(path.startsWith("/p/"))return viewPost(path.slice(3));
  if(path.startsWith("/tag/"))return viewTag(decodeURIComponent(path.slice(5)));
  if(path==="/login")return viewLogin();
  if(path==="/admin")return viewAdmin();
  if(path==="/write")return viewEditor(null);
  if(path.startsWith("/edit/"))return viewEditor(Number(path.slice(6)));
  return viewList();
}
(async function(){await refreshMe();route()})();
</script>
</body>
</html>
